<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #1a1a1a; margin: 0; padding: 15px; }
        .yxl-grid { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
        .m-card { background: #252525; border-radius: 10px; padding: 12px; width: 150px; border: 1px solid #333; position: relative; text-align: center; color: #fff; font-family: sans-serif; }
        .m-card.on { border: 2px solid #ff4d4d; box-shadow: 0 0 10px rgba(255, 77, 77, 0.4); }
        .status-dot { position: absolute; top: 8px; right: 8px; font-size: 10px; color: #555; }
        .on .status-dot { color: #ff4d4d; font-weight: bold; }
        .profile-img { width: 65px; height: 65px; border-radius: 50%; margin: 10px 0; border: 2px solid #444; }
        .on .profile-img { border-color: #ff4d4d; }
        .m-rank { font-size: 10px; color: #bc66ff; }
        .m-name { font-size: 16px; font-weight: bold; margin: 4px 0; }
        .m-btn { display: block; width: 100%; background: #333; color: #fff; text-decoration: none; font-size: 10px; padding: 6px 0; border-radius: 4px; margin-top: 8px; }
        .on .m-btn { background: #ff4d4d; }
    </style>
</head>
<body>
    <div class="yxl-grid" id="grid"></div>

    <script>
        const members = [
            {id: "sladk51", name: "리윤", rank: "부장"},
            {id: "jaeha010", name: "후잉", rank: "차장"},
            {id: "star49", name: "냥냥수주", rank: "과장"},
            {id: "smkim82372", name: "류서하", rank: "비서실장"},
            {id: "offside629", name: "율무", rank: "대리"},
            {id: "asy1218", name: "하랑짱", rank: "주임"},
            {id: "fhwm0602", name: "미로", rank: "사원"},
            {id: "jeewon1202", name: "유나연", rank: "인턴장"},
            {id: "zbxlzzz", name: "소다", rank: "시급이"},
            {id: "tkek55", name: "김유정", rank: "시급이"},
            {id: "iluvpp", name: "서니", rank: "신입"},
            {id: "wk3220", name: "백나현", rank: "신입"},
            {id: "ahrum0912", name: "아름", rank: "신입"},
            {id: "meldoy777", name: "너의멜로디", rank: "신입"},
            {id: "callgg", name: "꺼니", rank: "웨이터"},
            {id: "kimpooh0707", name: "김푸", rank: "웨이터"}
        ];

        const grid = document.getElementById('grid');
        grid.innerHTML = members.map(m => `
            <div class="m-card" id="card-${m.id}">
                <div class="status-dot" id="dot-${m.id}">○ 퇴근</div>
                <img src="https://stimg.sooplive.com/LOGO/${m.id.substring(0,2)}/${m.id}/m/${m.id}.webp" class="profile-img">
                <div class="m-rank">${m.rank}</div>
                <div class="m-name">${m.name}</div>
                <a href="https://www.sooplive.com/station/${m.id}" class="m-btn" target="_blank">방송국</a>
            </div>
        `).join('');

        function refresh() {
            fetch("status.json?v=" + new Date().getTime())
                .then(r => r.json())
                .then(data => {
                    members.forEach(m => {
                        const card = document.getElementById(`card-${m.id}`);
                        const dot = document.getElementById(`dot-${m.id}`);
                        if (data[m.id] && data[m.id].is_on) {
                            card.classList.add('on');
                            dot.innerText = "● 근무";
                        } else {
                            card.classList.remove('on');
                            dot.innerText = "○ 퇴근";
                        }
                    });
                });
        }
        refresh();
        setInterval(refresh, 60000);
    </script>
</body>
</html>
