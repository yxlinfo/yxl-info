- name: 파이썬 환경 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 이 단계가 꼭 있어야 합니다!
      - name: 필요한 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: 파이썬 크롤링 스크립트 실행
        run: python yxl.py
