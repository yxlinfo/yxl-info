name: Update Notice
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: pip install requests
      - run: python main.py
      - run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          git add yxlinfo.db index.html
          git commit -m "Update DB & HTML" || exit 0
          git push
