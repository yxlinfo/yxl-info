<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>YXL Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background-color: #121212; color: #e0e0e0; }

        /* [네비게이션바] */
        .navbar {
            display: flex;
            align-items: center;
            background-color: #181818;
            padding: 15px 5%;
            border-bottom: 1px solid #333;
            position: relative;
        }

        .logo { font-size: 1.4rem; font-weight: 800; color: #d4af37; letter-spacing: 1px; }

        /* 메뉴를 중앙으로 배치하기 위한 래퍼 */
        .nav-wrapper {
            flex: 1; /* 화면 중앙을 차지 */
            display: flex;
            justify-content: center; /* 내부 아이템 중앙 정렬 */
        }

        .nav-menu { display: flex; list-style: none; }
        .nav-menu > li { position: relative; margin: 0 20px; }
        .nav-menu a { text-decoration: none; color: #ccc; font-size: 0.95rem; transition: 0.2s; padding: 10px 0; }
        .nav-menu a:hover { color: #d4af37; }

        /* [드롭다운] 마우스 안 사라지게 개선 */
        .dropdown { position: relative; }
        
        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%; /* 네비게이션바 바로 아래에 밀착 */
            left: 50%; /* 가운데 정렬 시작점 */
            transform: translateX(-50%); /* 정확히 중앙으로 이동 */
            background-color: #1a1a1a;
            border: 1px solid #333;
            width: 130px;
            padding: 5px 0;
            z-index: 1000;
        }

        /* 호버 시 유지 및 마우스 감지 영역 확대 */
        .dropdown:hover .dropdown-content { display: block; }
        
        .dropdown-content li { list-style: none; text-align: center; }
        .dropdown-content a { 
            display: block; 
            padding: 10px 15px; 
            font-size: 0.9rem; 
            color: #aaa; 
        }
        .dropdown-content a:hover { 
            color: #d4af37; 
            background-color: #222; 
        }

        /* [본문] */
        .content { padding: 40px 5%; }
        h1 { color: #d4af37; font-size: 1.2rem; }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo">YXL</div>
        
        <nav class="nav-wrapper">
            <ul class="nav-menu">
                <li><a href="#">홈</a></li>
                <li><a href="#">현황판</a></li>
                <li class="dropdown">
                    <a href="#">데이터 ▼</a>
                    <ul class="dropdown-content">
                        <li><a href="#">VIP랭킹</a></li>
                        <li><a href="#">매출표</a></li>
                        <li><a href="#">정산표</a></li>
                    </ul>
                </li>
                <li><a href="#">시그니쳐</a></li>
                <li><a href="#">보라방송</a></li>
            </ul>
        </nav>
        
        <div style="width: 70px;"></div>
    </header>

    <main class="content">
        <h1>Dashboard</h1>
        <p>데이터가 로딩되는 영역입니다.</p>
    </main>

</body>
</html>
