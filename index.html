<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        body { margin: 0; padding: 0; background-color: transparent; font-family: 'Malgun Gothic', sans-serif; }
        .dashboard-container { max-width: 100%; border: 1px solid #ddd; border-radius: 12px; overflow: hidden; background: #fff; }
        
        /* 탭 라디오 버튼 */
        input[name="tab-control"] { display: none; }
        
        /* 탭 메뉴 */
        .tabs { display: flex; background: #f8f9fa; border-bottom: 2px solid #eee; }
        .tabs label { flex: 1; padding: 15px 0; text-align: center; cursor: pointer; font-weight: bold; color: #666; font-size: 14px; transition: 0.3s; }
        
        /* 활성화된 탭 스타일 */
        #tab1:checked ~ .tabs label[for="tab1"],
        #tab2:checked ~ .tabs label[for="tab2"],
        #tab3:checked ~ .tabs label[for="tab3"] { background: #fff; color: #007bff; border-bottom: 3px solid #007bff; }

        /* 콘텐츠 영역 */
        .tab-content { display: none; padding: 15px; min-height: 250px; }
        #tab1:checked ~ .content1,
        #tab2:checked ~ .content2,
        #tab3:checked ~ .content3 { display: block; }

        /* 표 스타일 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f4f4f4; border: 1px solid #ddd; padding: 10px; font-size: 13px; }
        td { border: 1px solid #eee; padding: 10px; text-align: center; font-size: 13px; }
        .plus-val { color: #ff4d4d; font-weight: bold; font-size: 11px; }
        .assemble-box { text-align: center; padding: 40px 0; }
        .assemble-time { font-size: 24px; font-weight: bold; color: #d9534f; margin-top: 10px; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <input type="radio" id="tab1" name="tab-control" checked>
    <input type="radio" id="tab2" name="tab-control">
    <input type="radio" id="tab3" name="tab-control">

    <div class="tabs">
        <label for="tab1">📅 일정표</label>
        <label for="tab2">📜 공약표</label>
        <label for="tab3">⏰ 어셈블</label>
    </div>

    <div class="tab-content content1">
        <table>
            <thead>
                <tr><th>시간</th><th>내용</th></tr>
            </thead>
            <tbody>
                <tr><td>18:00</td><td>방송 시작</td></tr>
                <tr><td>20:00</td><td>메인 콘텐츠 시작</td></tr>
            </tbody>
        </table>
    </div>

    <div class="tab-content content2">
        <table>
            <thead>
                <tr><th>항목</th><th>수치</th></tr>
            </thead>
            <tbody>
                <tr>
                    <td>오늘의 풍</td>
                    <td>100,000 <span class="plus-val">(+5,200)</span></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="tab-content content3">
        <div class="assemble-box">
            <div style="font-size: 14px; color: #888;">오늘의 어셈블 예정 시간</div>
            <div class="assemble-time">21:30</div>
        </div>
    </div>
</div>

</body>
</html>
