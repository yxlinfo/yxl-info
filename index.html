<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YXL Dashboard</title>
    <style>
        :root {
            --bg: #0F0D09; --panel: #181410; --card: #1E1A14;
            --gold: #C5A059; --text: #F5F0E8; --text-sub: #8A7F70;
            --border: rgba(197,160,89,0.22); --red: #d9213a;
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:Pretendard,'Apple SD Gothic Neo',sans-serif; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        h2 { font-size: 14px; color: var(--gold); margin-bottom: 12px; border-left: 3px solid var(--gold); padding-left: 10px; text-transform: uppercase; }
        .section { margin-bottom: 30px; }
        
        /* 공지사항 */
        .notice-box { background: var(--panel); padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
        .notice-item { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; font-size: 13px; }

        /* 라이브 (가로 슬라이드) */
        .live-scroll-container { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .live-card { flex: 0 0 160px; background: var(--card); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); text-decoration: none; color: white; }
        .thumb { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        .badge { position: absolute; top: 5px; left: 5px; background: var(--red); color: white; font-size: 9px; padding: 2px 5px; border-radius: 3px; font-weight: bold; }
        .meta { padding: 10px; }
        .name { font-size: 13px; font-weight: bold; display: block; }
        .viewers { font-size: 11px; color: var(--gold); }

        /* 일정표 & 숏츠 그리드 */
        .bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .bottom-box { background: var(--panel); padding: 15px; border-radius: 8px; border: 1px solid var(--border); min-height: 250px; }
        
        /* 일정 카드 */
        .sched-card { background: var(--card); border-left: 4px solid var(--gold); border-radius: 4px; padding: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; }
        .sched-dday { font-size: 16px; font-weight: 800; color: var(--gold); min-width: 45px; text-align: center; }
        .sched-info { flex: 1; }
        .sched-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; display: block; }
        .sched-meta { font-size: 11px; color: var(--text-sub); }
        .tag { font-size: 9px; padding: 2px 6px; border-radius: 10px; margin-right: 5px; font-weight: bold; }
        .tag-보라 { background: var(--red); color: white; }
        .tag-엑셀 { background: #3498db; color: white; }

        @media (max-width: 600px) { .bottom-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <section class="section">
        <h2>공지사항</h2>
        <div id="notice-list" class="notice-box">로딩 중...</div>
    </section>

    <section class="section">
        <h2>LIVE</h2>
        <div id="live-list" class="live-scroll-container">로딩 중...</div>
    </section>

    <div class="bottom-grid">
        <section class="section">
            <h2>일정표</h2>
            <div id="schedule-list" class="bottom-box">로딩 중...</div>
        </section>
        <section class="section">
            <h2>숏츠</h2>
            <div class="bottom-box" style="display:flex; align-items:center; justify-content:center; color:var(--text-sub)">준비 중...</div>
        </section>
    </div>
</div>

<script>
    // 1. 공지 불러오기
    fetch('notices.json').then(r => r.json()).then(data => {
        document.getElementById('notice-list').innerHTML = data.slice(0, 5).map(n => `
            <div class="notice-item"><span>${n.title}</span><span style="color:var(--text-sub)">${n.user_nick}</span></div>
        `).join('');
    });

    // 2. 라이브 불러오기
    fetch('live.json').then(r => r.json()).then(data => {
        const container = document.getElementById('live-list');
        if(data.length === 0) { container.innerHTML = '<div style="color:var(--text-sub); padding:20px;">방송 중인 멤버가 없습니다.</div>'; return; }
        container.innerHTML = data.map(l => `
            <a href="${l.live_link}" target="_blank" class="live-card">
                <div class="thumb">
                    <img src="https://liveimg.sooplive.com/h/${l.live_link.split('/').pop()}.webp" style="width:100%; height:100%; object-fit:cover;">
                    <span class="badge">LIVE</span>
                </div>
                <div class="meta">
                    <span class="name">${l.name}</span>
                    <span class="viewers">${l.viewers.toLocaleString()}명 시청 중</span>
                </div>
            </a>
        `).join('');
    });

    // 3. 일정표 불러오기 (D-Day 및 태그 로직)
    fetch('schedule.json').then(r => r.json()).then(data => {
        const el = document.getElementById('schedule-list');
        el.innerHTML = data.map(s => {
            const target = new Date(s.date);
            const today = new Date();
            const diff = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
            let dday = diff === 0 ? "D-Day" : (diff > 0 ? `D-${diff}` : "종료");
            
            return `
            <div class="sched-card">
                <div class="sched-dday">${dday}</div>
                <div class="sched-info">
                    <span class="sched-title"><span class="tag tag-${s.type}">${s.type}</span>${s.title}</span>
                    <span class="sched-meta">${target.getMonth()+1}/${target.getDate()} ${String(target.getHours()).padStart(2,'0')}:${String(target.getMinutes()).padStart(2,'0')} | ${s.desc}</span>
                </div>
            </div>`;
        }).join('');
    });
</script>
</body>
</html>
