<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>YXL Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root { --gold: #d4af37; --bg: #08080c; --border: rgba(212, 175, 55, 0.2); }
        body { background: var(--bg); color: #fff; font-family: 'Pretendard', sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; }
        
        h2 { font-size: 16px; color: var(--gold); margin-bottom: 12px; border-left: 3px solid var(--gold); padding-left: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .section { margin-bottom: 25px; }
        .bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        /* 박스 및 리스트 */
        .box { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 15px; border-radius: 8px; }
        .item { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        .item:last-child { border: none; }
        
        /* 텍스트 스타일 */
        .name { font-weight: 700; color: #fff; }
        .pos { color: var(--gold); font-size: 11px; margin-left: 6px; }
        .live-badge { color: #ff4757; font-weight: 800; font-size: 11px; text-decoration: none; }
        .date { color: #888; font-size: 12px; }

        @media (max-width: 600px) { .bottom-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="section">
        <h2>공지사항</h2>
        <div id="notice-list" class="box">로딩 중...</div>
    </div>

    <div class="bottom-grid">
        <div class="section">
            <h2>LIVE</h2>
            <div id="live-list" class="box">로딩 중...</div>
        </div>
        <div class="section">
            <h2>일정표</h2>
            <div class="box">
                <div class="item">
                    <span class="name">2026.05.31 Y사 퀴즈쇼</span>
                </div>
                </div>
        </div>
    </div>
</div>

<script>
    // 공지사항 로드
    fetch('notices.json').then(r => r.json()).then(data => {
        document.getElementById('notice-list').innerHTML = data.slice(0, 5).map(n => `
            <div class="item">
                <span>${n.title}</span>
                <span class="date">${n.user_nick}</span>
            </div>
        `).join('');
    });

    // 라이브 로드
    fetch('live.json').then(r => r.json()).then(data => {
        const list = document.getElementById('live-list');
        if(data.length === 0) { list.innerHTML = '<div class="item">현재 방송 중인 멤버가 없습니다.</div>'; return; }
        list.innerHTML = data.map(l => `
            <div class="item">
                <div><span class="name">${l.name}</span><span class="pos">${l.pos}</span></div>
                <a href="${l.live_link}" target="_blank" class="live-badge">LIVE ${l.viewers.toLocaleString()}</a>
            </div>
        `).join('');
    });
</script>
</body>
</html>
