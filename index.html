<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>YXL Dashboard</title>
    <style>
        /* CSS 스타일 시작 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background-color: #121212; color: #e0e0e0; }

        /* 네비게이션바 전체 */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: flex-start; /* 로고와 메뉴 왼쪽 정렬 */
            padding: 20px 5%;
            background: #1a1a1a;
            border-bottom: 2px solid #c5a059; /* 골드 테두리 */
        }

        /* 로고 스타일 */
        .logo { font-size: 1.5rem; font-weight: bold; color: #c5a059; margin-right: 50px; }

        /* 메뉴 리스트 */
        .nav-menu { display: flex; list-style: none; }
        .nav-menu > li { position: relative; margin-right: 30px; }
        .nav-menu a { text-decoration: none; color: #b0b0b0; font-size: 1rem; transition: 0.3s; }
        .nav-menu a:hover { color: #c5a059; }

        /* 드롭다운 영역 */
        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background-color: #1a1a1a;
            border: 1px solid #333;
            width: 120px;
            padding: 10px 0;
            margin-top: 10px;
            border-radius: 4px;
        }

        .dropdown:hover .dropdown-content { display: block; }
        .dropdown-content li { list-style: none; padding: 5px 15px; }
        .dropdown-content a { font-size: 0.9rem; }
        /* CSS 스타일 끝 */
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo">YXL</div>
        <nav>
            <ul class="nav-menu">
                <li><a href="#">홈</a></li>
                <li><a href="#">현황판</a></li>
                <li class="dropdown">
                    <a href="#">데이터 ▼</a>
                    <ul class="dropdown-content">
                        <li><a href="#">VIP랭킹</a></li>
                        <li><a href="#">매출표</a></li>
                        <li><a href="#">정산표</a></li>
                    </ul>
                </li>
                <li><a href="#">시그니쳐</a></li>
                <li><a href="#">보라방송</a></li>
            </ul>
        </nav>
    </header>

</body>
</html>
