name: Update Dashboard Data

on:
  schedule:
    - cron: '*/5 * * * *' # 5분마다 실행
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    concurrency:
      group: update-data
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 통합 스크립트 실행을 위해 playwright, beautifulsoup4, requests 설치
          pip install playwright beautifulsoup4 requests
          playwright install chromium
          playwright install-deps chromium
          
      - name: Run crawler.py
        # 파일명을 통합한 파일 이름(crawler.py)으로 맞추세요
        run: python crawler.py
        
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add notices.json live.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto update: notices and live data" && git push)
