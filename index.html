<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커뮤니티 대시보드</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* 네비게이션 바 */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            background-color: #1a1a1a; padding: 15px 30px; border-bottom: 1px solid #333;
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-size: 22px; font-weight: bold; color: #d4af37; text-decoration: none; letter-spacing: 1px; }
        .nav-links { list-style: none; display: flex; gap: 35px; }
        .nav-links > li { position: relative; }
        .nav-links a {
            color: #e0e0e0; text-decoration: none; font-size: 16px; font-weight: 500;
            transition: color 0.3s ease; padding: 10px 0; display: block;
        }
        .nav-links a:hover { color: #d4af37; }

        /* 드롭다운 */
        .dropdown-menu {
            display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
            background-color: #1a1a1a; list-style: none; min-width: 140px;
            border: 1px solid #333; border-radius: 6px; box-shadow: 0 8px 16px rgba(0, 0, 0, 0.6);
            padding: 8px 0; z-index: 1001;
        }
        .dropdown:hover .dropdown-menu { display: block; }
        .dropdown-menu li { text-align: center; }
        .dropdown-menu a { padding: 10px 15px; font-size: 14px; color: #cccccc; }
        .dropdown-menu a:hover { background-color: #2a2a2a; color: #d4af37; }

        .menu-toggle { display: none; flex-direction: column; cursor: pointer; gap: 5px; }
        .menu-toggle span { height: 3px; width: 25px; background-color: #fff; border-radius: 2px; }

        /* 메인 레이아웃 */
        .home-container {
            max-width: 1300px; margin: 40px auto; padding: 0 20px;
            display: grid; gap: 30px; grid-template-columns: 1fr 1fr;
        }
        .section-box {
            background-color: #1a1a1a; border: 1px solid #333; border-radius: 12px;
            padding: 25px; box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
        }
        .notice-section { grid-column: 1 / -1; }
        
        .section-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; border-bottom: 2px solid #2e2e2e; padding-bottom: 12px;
        }
        .section-title { font-size: 20px; font-weight: 600; color: #d4af37; }
        .more-btn { font-size: 13px; color: #888; text-decoration: none; }
        .more-btn:hover { color: #d4af37; }

        /* 리스트 스타일 */
        .notice-list { list-style: none; padding: 0; margin: 0; }
        .notice-item {
            display: flex; align-items: center; padding: 14px 15px;
            border-bottom: 1px solid #262626; transition: background-color 0.2s ease;
        }
        .notice-item:hover { background-color: #222222; }
        .notice-badge {
            background-color: #d4af37; color: #121212; font-size: 11px; font-weight: bold;
            padding: 3px 7px; border-radius: 4px; margin-right: 15px; white-space: nowrap;
        }
        .notice-badge.normal { background-color: #3a3a3a; color: #b5b5b5; }
        .notice-title {
            flex-grow: 1; font-size: 15px; color: #e0e0e0; text-decoration: none;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-right: 20px;
        }
        .notice-title:hover { color: #d4af37; }
        .notice-author {
            font-size: 13px; color: #aaa; text-decoration: none; width: 110px;
            text-align: right; margin-right: 20px; white-space: nowrap;
        }
        .notice-author:hover { color: #d4af37; }
        .notice-date { font-size: 13px; color: #666; width: 70px; text-align: right; white-space: nowrap; }

        .content-placeholder {
            min-height: 200px; display: flex; align-items: center; justify-content: center;
            color: #555; font-size: 14px; background-color: #121212; border-radius: 8px; border: 1px dashed #333;
        }

        @media (max-width: 768px) {
            .nav-links { display: none; flex-direction: column; position: absolute; top: 100%; left: 0; width: 100%; background-color: #1a1a1a; padding: 20px 0; gap: 10px; border-bottom: 1px solid #333; }
            .nav-links.active { display: flex; }
            .nav-links > li { text-align: center; }
            .dropdown-menu { position: static; transform: none; background-color: #222; display: none; width: 100%; }
            .dropdown.active .dropdown-menu { display: block; }
            .menu-toggle { display: flex; }
            .home-container { grid-template-columns: 1fr; margin: 20px auto; }
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="#" class="logo">CREW DASHBOARD</a>
            <div class="menu-toggle" id="mobile-menu"><span></span><span></span><span></span></div>
            <ul class="nav-links" id="nav-links">
                <li><a href="#">홈</a></li>
                <li><a href="#">현황판</a></li>
                <li class="dropdown">
                    <a href="#">데이터 ▾</a>
                    <ul class="dropdown-menu">
                        <li><a href="#">VIP랭킹</a></li>
                        <li><a href="#">매출표</a></li>
                        <li><a href="#">정산표</a></li>
                    </ul>
                </li>
                <li><a href="#">보라방송</a></li>
            </ul>
        </nav>
    </header>

    <main class="home-container">
        <section class="section-box notice-section">
            <div class="section-header">
                <h2 class="section-title">공지사항</h2>
                <a href="#" class="more-btn">더보기 +</a>
            </div>
            <ul class="notice-list" id="notice-container">
                <div class="content-placeholder" style="border:none; min-height:100px;">공지사항 데이터를 불러오는 중입니다...</div>
            </ul>
        </section>

        <section class="section-box">
            <div class="section-header">
                <h2 class="section-title">라이브</h2>
                <a href="#" class="more-btn">더보기 +</a>
            </div>
            <div class="content-placeholder">현재 방송 중인 라이브 목록 구역입니다.</div>
        </section>

        <section class="section-box">
            <div class="section-header">
                <h2 class="section-title">시그댄스</h2>
                <a href="#" class="more-btn">더보기 +</a>
            </div>
            <div class="content-placeholder">시그댄스 정산 및 리스트 구역입니다.</div>
        </section>
    </main>

    <script>
        function loadNotices() {
            // 파이썬 크롤러가 생성한 JSON 파일을 읽어옵니다
            fetch('./notice_data.json')
                .then(response => {
                    if (!response.ok) throw new Error('데이터 파일을 찾을 수 없습니다.');
                    return response.json();
                })
                .then(data => {
                    const container = document.getElementById('notice-container');
                    container.innerHTML = ''; 

                    if (data.length === 0) {
                        container.innerHTML = '<div class="content-placeholder" style="border:none;">등록된 공지사항이 없습니다.</div>';
                        return;
                    }

                    data.forEach(notice => {
                        const li = document.createElement('li');
                        li.className = 'notice-item';
                        const badgeClass = notice.type === 'notice' ? 'notice-badge' : 'notice-badge normal';
                        const badgeText = notice.type === 'notice' ? '공지' : '일반';
                        
                        // JSON에 담긴 다이렉트 링크 사용
                        const postUrl = notice.link || '#';

                        li.innerHTML = `
                            <span class="${badgeClass}">${badgeText}</span>
                            <a class="notice-title" href="${postUrl}" target="_blank">${notice.title}</a>
                            <a class="notice-author" href="${postUrl}" target="_blank">${notice.author}</a>
                            <span class="notice-date">${notice.date}</span>
                        `;
                        container.appendChild(li);
                    });
                })
                .catch(error => {
                    document.getElementById('notice-container').innerHTML = 
                        '<div class="content-placeholder" style="border:none; color:#ff6b6b;">' + error.message + '</div>';
                });
        }

        const mobileMenu = document.getElementById('mobile-menu');
        const navLinks = document.getElementById('nav-links');
        const dropdown = document.querySelector('.dropdown');

        mobileMenu.addEventListener('click', () => navLinks.classList.toggle('active'));
        dropdown.addEventListener('click', (e) => {
            if(window.innerWidth <= 768) { e.stopPropagation(); dropdown.classList.toggle('active'); }
        });

        document.addEventListener('DOMContentLoaded', loadNotices);
    </script>
</body>
</html>
