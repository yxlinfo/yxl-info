<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>YXL Dashboard | Gold Theme</title>
    <style>
        :root {
            --bg-dark: #12100C; --card-bg: #1A1713; --gold: #C5A059;
            --gold-light: #E6C275; --text-main: #FDFDFD; --text-sub: #A69A8A;
            --border-gold: rgba(197, 160, 89, 0.3); --badge-red: #D32F2F;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; color: var(--text-main); }
        body { background-color: var(--bg-dark); }

        .navbar { background-color: var(--card-bg); border-bottom: 1px solid var(--border-gold); padding: 12px 0; }
        .nav-inner { max-width: 1000px; margin: 0 auto; display: flex; align-items: center; padding: 0 20px; }
        .logo-area { display: flex; align-items: center; margin-right: 40px; }
        .logo-text { font-size: 1.1rem; font-weight: 800; color: var(--gold-light); }

        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .card { background-color: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-gold); }
        .card.notice { grid-column: span 2; } 
        h2 { display: flex; align-items: center; color: var(--gold-light); font-size: 0.9rem; margin-bottom: 15px; }
        .h2-icon { width: 18px; height: 18px; margin-right: 8px; fill: var(--gold); }
        
        .notice-grid { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; }
        .notice-card { 
            background-color: var(--bg-dark); border-left: 3px solid var(--gold); border-radius: 8px; padding: 15px; 
            min-width: 280px; max-width: 320px; cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease; 
            display: flex; flex-direction: column; position: relative;
        }
        .notice-card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(197, 160, 89, 0.15); }
        
        .thumb-wrapper { position: relative; width: 100%; height: 140px; margin-bottom: 12px; }
        .notice-thumb { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }
        .badge-new { 
            position: absolute; top: -6px; left: -6px; background: linear-gradient(135deg, #ff4e50, #f9d423); 
            color: #fff; font-size: 0.65rem; font-weight: 900; padding: 4px 8px; border-radius: 6px; 
            box-shadow: 0 2px 6px rgba(0,0,0,0.5); z-index: 10; letter-spacing: 0.5px;
        }
        
        .card-meta-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .author-info { display: flex; align-items: center; gap: 6px; }
        .author-profile { width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--border-gold); object-fit: cover; }
        .card-author { color: var(--gold-light); font-weight: bold; font-size: 0.75rem; }
        .card-date { color: var(--text-sub); font-size: 0.65rem; }
        
        .notice-card h4 { color: var(--text-main); font-size: 0.9rem; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .notice-card p { color: var(--text-sub); font-size: 0.7rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; margin-bottom: 15px; flex-grow: 1;}
        
        .card-meta-bottom { display: flex; flex-wrap: wrap; gap: 10px; font-size: 0.65rem; color: var(--text-sub); border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; }
        .stat-item { display: flex; align-items: center; gap: 4px; }
        .stat-icon { width: 12px; height: 12px; fill: var(--text-sub); }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background-color: var(--card-bg); border: 1px solid var(--gold); border-radius: 12px; width: 90%; max-width: 650px; max-height: 85vh; overflow-y: auto; padding: 30px; position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 24px; color: var(--gold); cursor: pointer; transition: 0.2s; }
        .close-btn:hover { color: var(--gold-light); }
        
        .modal-header { border-bottom: 1px solid var(--border-gold); margin-bottom: 20px; padding-bottom: 15px; }
        .modal-header h2 { font-size: 1.3rem; color: var(--gold-light); margin-bottom: 10px; line-height: 1.3; }
        .modal-meta { display: flex; align-items: center; justify-content: space-between; font-size: 0.8rem; color: var(--text-sub); }
        .modal-author-info { display: flex; align-items: center; gap: 8px; }
        
        .modal-body-content { font-size: 0.9rem; line-height: 1.7; color: var(--text-main); }
        .modal-body-content img { max-width: 100%; height: auto; border-radius: 8px; margin: 15px 0; display: block; }
        .modal-body-content p { margin-bottom: 12px; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--border-gold); border-radius: 3px; }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="nav-inner"><div class="logo-area"><span class="logo-text">YXL</span></div></div>
    </header>

    <main class="container">
        <section class="card notice">
            <h2><svg class="h2-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>스트리머 공지사항</h2>
            <div id="notice-container" class="notice-grid">
                <div style="color:var(--text-sub); font-size:0.75rem; text-align:center; width: 100%;">공지사항 데이터를 불러오는 중입니다...</div>
            </div>
        </section>
    </main>

    <div id="notice-modal" class="modal-overlay" onclick="closeNoticeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeNoticeModal()">&times;</span>
            <div class="modal-header">
                <h2 id="modal-title"></h2>
                <div class="modal-meta">
                    <div class="modal-author-info" id="modal-author"></div>
                    <span id="modal-date"></span>
                </div>
            </div>
            <div id="modal-body" class="modal-body-content"></div>
        </div>
    </div>

    <script>
        window.noticeData = [];
        document.addEventListener('DOMContentLoaded', loadNotices);

        async function loadNotices() {
            const container = document.getElementById('notice-container');
            
            try {
                // notices.json 파일 호출
                const response = await fetch('notices.json');
                
                if (!response.ok) {
                    throw new Error(`HTTP 에러 발생: ${response.status}`);
                }
                
                const notices = await response.json();
                container.innerHTML = ''; 

                if (!notices || notices.length === 0) {
                    container.innerHTML = `<div style="color:var(--text-sub); font-size:0.75rem; text-align:center; width: 100%;">수집된 공지사항이 없습니다.</div>`;
                    return;
                }

                notices.forEach(notice => {
                    const noticeDate = new Date(notice.date.replace(/-/g, '/'));
                    const diffHours = (new Date() - noticeDate) / (1000 * 60 * 60);
                    const isNew = diffHours < 48; 
                    const badgeHTML = isNew ? `<span class="badge-new">NEW</span>` : '';

                    const thumbHTML = notice.thumbnail ? `
                        <div class="thumb-wrapper">
                            ${badgeHTML}
                            <img src="${notice.thumbnail}" class="notice-thumb" alt="thumbnail">
                        </div>
                    ` : (isNew ? `<div style="position:relative; width:100%; height:20px; margin-bottom:10px;">${badgeHTML}</div>` : '');

                    const profileHTML = notice.profile_image ? `<img src="${notice.profile_image}" class="author-profile" alt="profile">` : '';
                    const shortDate = notice.date.substring(5, 16).replace('-', '.');

                    const i_view = `<svg class="stat-icon" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>`;
                    const i_vod = `<svg class="stat-icon" viewBox="0 0 24 24"><path d="M10 16.5l6-4.5-6-4.5v9zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>`;
                    const i_cmt = `<svg class="stat-icon" viewBox="0 0 24 24"><path d="M21.99 4c0-1.1-.89-2-1.99-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4-.01-18z"/></svg>`;
                    const i_like = `<svg class="stat-icon" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
                    const i_pic = `<svg class="stat-icon" viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>`;

                    const cardHTML = `
                        <div class="notice-card" onclick="openNoticeModal(${notice.id})">
                            ${thumbHTML}
                            <div class="card-meta-top">
                                <div class="author-info">
                                    ${profileHTML}
                                    <span class="card-author">${notice.user_nick}</span>
                                </div>
                                <span class="card-date">${shortDate}</span>
                            </div>
                            <h4>${notice.title}</h4>
                            <p>${notice.summary}</p>
                            <div class="card-meta-bottom">
                                <span class="stat-item">${i_view} ${notice.read_cnt || 0}</span>
                                <span class="stat-item">${i_vod} ${notice.vod_read_cnt || 0}</span>
                                <span class="stat-item">${i_cmt} ${notice.comment_cnt || 0}</span>
                                <span class="stat-item">${i_like} ${notice.like_cnt || 0}</span>
                                <span class="stat-item">${i_pic} ${notice.photo_cnt || 0}</span>
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', cardHTML);
                });

                window.noticeData = notices;
                
            } catch (error) {
                console.error("데이터 로드 에러:", error);
                
                // 에러 발생 시, 원인을 화면에 직접 출력합니다.
                let errorMessage = error.message;
                if (window.location.protocol === 'file:') {
                    errorMessage = "내 컴퓨터(file://)에서 열었기 때문에 보안상 JSON을 읽을 수 없습니다.<br>반드시 깃허브에 올려서 웹 주소(http)로 확인하세요!";
                }

                container.innerHTML = `
                    <div style="color:var(--badge-red); font-size:0.75rem; text-align:center; width: 100%; padding:10px;">
                        <b>[오류 발생]</b><br>
                        ${errorMessage}
                    </div>
                `;
            }
        }

        function openNoticeModal(id) {
            const notice = window.noticeData.find(n => n.id === id);
            if (!notice) return;
            document.getElementById('modal-title').innerText = notice.title;
            const profileHTML = notice.profile_image ? `<img src="${notice.profile_image}" class="author-profile" alt="profile">` : '';
            document.getElementById('modal-author').innerHTML = `${profileHTML} <span style="color:var(--gold-light); font-weight:bold;">${notice.user_nick}</span>`;
            document.getElementById('modal-date').innerText = notice.date;
            document.getElementById('modal-body').innerHTML = notice.full_html; 
            document.getElementById('notice-modal').style.display = 'flex';
        }

        function closeNoticeModal(event) {
            if (event && event.target.id !== 'notice-modal') return;
            document.getElementById('notice-modal').style.display = 'none';
        }
    </script>
</body>
</html>
