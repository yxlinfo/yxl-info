<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>YXL Dashboard</title>
    <style>
        @font-face {
            font-family: 'BMJUA';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_one@1.0/BMJUA.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --bg: #0F0D09; --panel: #181410; --card: #201b15;
            --gold: #C5A059; --text: #F5F0E8; --sub: #8A7F70; --border: #332b22;
            
            --font-main: 'BMJUA', sans-serif;
            --fz-title: 18px; 
            --fz-lg: 15px;    
            --fz-md: 13px;    
            --fz-sm: 12px;    
            --fz-xs: 11px;    
        }
        
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { background: var(--bg); color: var(--text); padding: 20px; font-family: var(--font-main); letter-spacing: 0.3px; }
        a { text-decoration: none; color: inherit; }
        .container { max-width: 1000px; margin: 0 auto; }

        .category-section {
            background: var(--panel); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px; margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid rgba(197,160,89,0.2); padding-bottom: 10px; }
        .section-title { font-size: var(--fz-title); color: var(--gold); display: flex; align-items: center; gap: 8px; }
        .section-meta { font-size: var(--fz-md); color: var(--sub); margin-left: 8px; }
        .nav-buttons { display: flex; gap: 6px; }
        .nav-btn { 
            background: var(--card); border: 1px solid var(--border); color: var(--gold); 
            width: 32px; height: 32px; border-radius: 5px; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
            font-family: var(--font-main);
        }
        .nav-btn:hover { background: var(--gold); color: #000; }

        .scroll-container { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; scroll-behavior: smooth; scrollbar-width: none; }
        .scroll-container::-webkit-scrollbar { display: none; }

        /* 공지사항 카드 */
        .notice-card {
            flex: 0 0 280px; background: var(--card); border: 1px solid var(--border);
            border-radius: 8px; padding: 16px; display: flex; flex-direction: column; gap: 12px;
            transition: transform 0.2s, border-color 0.2s;
        }
        .notice-card:hover { border-color: var(--gold); transform: translateY(-3px); }
        .nc-head { display: flex; align-items: center; gap: 10px; }
        .nc-prof { width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
        .nc-name { font-size: var(--fz-md); color: var(--text); }
        .nc-title { font-size: var(--fz-lg); color: var(--text); line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .nc-stats { font-size: var(--fz-xs); color: var(--sub); display: flex; flex-wrap: wrap; gap: 8px; border-top: 1px dashed rgba(255,255,255,0.1); padding-top: 10px; }
        .badge-new { background: #d9213a; color: white; padding: 2px 5px; border-radius: 4px; font-size: var(--fz-xs); margin-right: 5px; }

        /* 라이브 카드 */
        .live-card {
            flex: 0 0 270px; background: var(--card); border: 1px solid var(--border);
            border-radius: 8px; overflow: hidden; transition: transform 0.2s, border-color 0.2s;
        }
        .live-card:hover { border-color: var(--gold); transform: translateY(-3px); }
        .lc-thumb-area { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        .lc-thumb-area img { width: 100%; height: 100%; object-fit: cover; }
        .lc-badge-live { position: absolute; top: 8px; left: 8px; background: #d9213a; color: white; font-size: var(--fz-xs); padding: 3px 6px; border-radius: 4px; }
        .lc-badge-viewers { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.8); color: white; font-size: var(--fz-xs); padding: 3px 6px; border-radius: 4px; }
        .lc-info { padding: 12px; display: flex; gap: 10px; align-items: center; }
        .lc-prof { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--gold); object-fit: cover; }
        .lc-text { flex: 1; overflow: hidden; display: flex; flex-direction: column; gap: 4px; }
        .lc-title { font-size: var(--fz-md); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
        .lc-name { font-size: var(--fz-md); color: var(--gold); }

        .bottom-grid { display: grid; grid-template-columns: 3fr 7fr; gap: 20px; }
        .bottom-grid > .category-section { min-width: 0; margin-bottom: 0; }
        
        .sched-card { background: var(--card); border-left: 3px solid var(--gold); padding: 12px; margin-bottom: 10px; border-radius: 4px; display: flex; align-items: center; gap: 15px; word-break: keep-all; }
        .sched-dday { font-size: var(--fz-title); color: var(--gold); min-width: 55px; text-align: center; }

        .shorts-card {
            flex: 0 0 150px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 8px; overflow: hidden; display: flex; flex-direction: column;
            transition: transform 0.2s, border-color 0.2s;
        }
        .shorts-card:hover { border-color: var(--gold); transform: translateY(-3px); }
        .shorts-thumb { width: 100%; aspect-ratio: 9/16; background: #000; position: relative; }
        .shorts-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .shorts-info { padding: 12px; display: flex; flex-direction: column; gap: 6px; flex: 1; }
        .shorts-name { font-size: var(--fz-xs); color: var(--gold); }
        .shorts-title { font-size: var(--fz-md); color: var(--text); line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        @media (max-width: 768px) { .bottom-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    
    <div class="category-section">
        <div class="section-header">
            <div class="section-title">📢 멤버별 최신 공지사항</div>
            <div class="nav-buttons">
                <button class="nav-btn" onclick="scrollArea('notice-list', -295)">◀</button>
                <button class="nav-btn" onclick="scrollArea('notice-list', 295)">▶</button>
            </div>
        </div>
        <div id="notice-list" class="scroll-container">로딩 중...</div>
    </div>

    <div class="category-section">
        <div class="section-header">
            <div class="section-title">📺 LIVE <span class="section-meta" id="live-count-text"></span></div>
            <div class="nav-buttons">
                <button class="nav-btn" onclick="scrollArea('live-list', -285)">◀</button>
                <button class="nav-btn" onclick="scrollArea('live-list', 285)">▶</button>
            </div>
        </div>
        <div id="live-list" class="scroll-container">로딩 중...</div>
    </div>

    <div class="bottom-grid">
        <div class="category-section">
            <div class="section-header"><div class="section-title">📅 일정표</div></div>
            <div id="schedule-list">로딩 중...</div>
        </div>
        
        <div class="category-section">
            <div class="section-header">
                <div class="section-title">🎬 숏츠</div>
                <div class="nav-buttons">
                    <button class="nav-btn" onclick="scrollArea('shorts-list', -165)">◀</button>
                    <button class="nav-btn" onclick="scrollArea('shorts-list', 165)">▶</button>
                </div>
            </div>
            <div id="shorts-list" class="scroll-container">로딩 중...</div>
        </div>
    </div>
</div>

<script>
    function scrollArea(id, amount) {
        document.getElementById(id).scrollBy({ left: amount, behavior: 'smooth' });
    }

    function timeAgo(dateStr) {
        if (!dateStr || dateStr.startsWith('1970')) return "-";
        const safeStr = dateStr.replace(/ /g, 'T').split('.')[0] + '+09:00';
        const target = new Date(safeStr);
        if (isNaN(target.getTime())) return "-";

        const diffMs = new Date() - target;
        if (diffMs < 0) return "방금 전"; 
        
        const diffMins = Math.floor(diffMs / 60000);
        const diffHrs = Math.floor(diffMins / 60);
        const diffDays = Math.floor(diffHrs / 24);

        if (diffMins < 60) return diffMins <= 0 ? "방금 전" : `${diffMins}분 전`;
        if (diffHrs < 24) return `${diffHrs}시간 전`;
        return `${diffDays}일 전`;
    }

    fetch('notices.json').then(r => r.json()).then(data => {
        const el = document.getElementById('notice-list');
        if(!data || data.length === 0) { el.innerHTML = '<div style="color:var(--sub)">공지사항이 없습니다.</div>'; return; }
        
        el.innerHTML = data.map(n => {
            const isNew = !n.date.startsWith('1970') && (new Date() - new Date(n.date.replace(/ /g, 'T')+'+09:00')) / 3600000 < 10;
            const timeDisplay = n.date.startsWith('1970') ? '기록 없음' : `🕒 ${timeAgo(n.date)}`;
            
            return `
            <a href="${n.link}" target="_blank" class="notice-card">
                <div class="nc-head">
                    <img src="${n.profile_image}" class="nc-prof" onerror="this.src='https://via.placeholder.com/34/1E1A14/C5A059'">
                    <span class="nc-name">${n.user_nick}</span>
                </div>
                <div class="nc-title">
                    ${isNew ? '<span class="badge-new">NEW</span>' : ''}${n.title}
                </div>
                <div class="nc-stats">
                    <span>${timeDisplay}</span>
                    <span>👁️ ${n.read_cnt}</span>
                    <span>👍 ${n.like_cnt}</span>
                    <span>💬 ${n.comment_cnt}</span>
                </div>
            </a>
            `;
        }).join('');
    }).catch(() => { document.getElementById('notice-list').innerHTML = '데이터를 불러올 수 없습니다.'; });

    fetch('live.json').then(r => r.json()).then(data => {
        const el = document.getElementById('live-list');
        document.getElementById('live-count-text').textContent = `(총원 14명 / 라이브 인원 ${data.length}명)`;
        
        if(!data || data.length === 0) { el.innerHTML = '<div style="color:var(--sub)">현재 방송 중인 멤버가 없습니다.</div>'; return; }
        
        el.innerHTML = data.map(l => `
            <a href="${l.live_link}" target="_blank" class="live-card">
                <div class="lc-thumb-area">
                    <img src="${l.thumbnail}" onerror="this.src='https://via.placeholder.com/270x152/1E1A14/C5A059?text=No+Signal'">
                    <span class="lc-badge-live">LIVE</span>
                    <span class="lc-badge-viewers">👥 ${l.viewers.toLocaleString()}명</span>
                </div>
                <div class="lc-info">
                    <img src="${l.profile_image}" class="lc-prof" onerror="this.src='https://via.placeholder.com/36/1E1A14/C5A059'">
                    <div class="lc-text">
                        <div class="lc-title">${l.title}</div>
                        <div class="lc-name">${l.name} (${l.pos})</div>
                        </div>
                </div>
            </a>
        `).join('');
    }).catch(() => { document.getElementById('live-list').innerHTML = '데이터를 불러올 수 없습니다.'; });

    fetch('schedule.json').then(r => r.json()).then(data => {
        const el = document.getElementById('schedule-list');
        if(!data || data.length === 0) { el.innerHTML = '<div style="color:var(--sub)">등록된 일정이 없습니다.</div>'; return; }
        
        const todayKST = new Date(new Date().toLocaleString('en-US', {timeZone: 'Asia/Seoul'}));
        todayKST.setHours(0,0,0,0);

        el.innerHTML = data.map(s => {
            const safeStr = s.date.replace(/t/i, ' ').trim(); 
            const dateParts = safeStr.split(' ');
            const timePart = dateParts[1] ? dateParts[1] : '00:00';
            const target = new Date(`${dateParts[0]}T${timePart}:00+09:00`);
            
            const dDayTarget = new Date(target);
            dDayTarget.setHours(0,0,0,0);
            const diff = Math.ceil((dDayTarget - todayKST) / (1000 * 60 * 60 * 24));
            let dday = diff === 0 ? "D-Day" : (diff > 0 ? `D-${diff}` : "종료");
            
            const hours = target.getHours().toString().padStart(2, '0');
            const mins = target.getMinutes().toString().padStart(2, '0');
            const timeDisplay = dateParts[1] ? ` ⏰ ${hours}:${mins}` : '';

            const typeBadge = s.type ? `<span style="background:var(--gold); color:#000; padding:2px 5px; border-radius:3px; font-size:var(--fz-xs); margin-right:4px;">${s.type}</span>` : '';
            const descBox = s.desc ? `<div style="font-size:var(--fz-sm); color:var(--text); background:rgba(255,255,255,0.05); padding:8px 10px; border-radius:4px; width:100%; line-height:1.4; white-space:pre-wrap; margin-top:5px;">${s.desc}</div>` : '';

            return `
            <div class="sched-card" style="flex-direction: column; align-items: flex-start; gap: 8px; padding: 15px;">
                <div style="display: flex; align-items: center; gap: 15px; width: 100%;">
                    <div class="sched-dday">${dday}</div>
                    <div style="flex: 1;">
                        <div style="font-size:var(--fz-lg); margin-bottom:5px; display:flex; align-items:center;">
                            ${typeBadge} ${s.title}
                        </div>
                        <div style="font-size:var(--fz-sm); color:var(--sub)">
                            📅 ${target.getMonth()+1}월 ${target.getDate()}일${timeDisplay}
                        </div>
                    </div>
                </div>
                ${descBox}
            </div>`;
        }).join('');
    }).catch(() => { document.getElementById('schedule-list').innerHTML = '데이터를 불러올 수 없습니다.'; });

    fetch('shorts.json').then(r => r.json()).then(data => {
        const el = document.getElementById('shorts-list');
        if(!data || data.length === 0) { el.innerHTML = '<div style="color:var(--sub)">등록된 숏츠가 없습니다.</div>'; return; }
        
        el.innerHTML = data.map(s => `
            <a href="${s.link}" target="_blank" class="shorts-card">
                <div class="shorts-thumb">
                    <img src="${s.thumbnail}" onerror="this.src='https://via.placeholder.com/150x266/1E1A14/C5A059?text=No+Image'">
                </div>
                <div class="shorts-info">
                    <div class="shorts-name">${s.name}</div>
                    <div class="shorts-title">${s.title}</div>
                </div>
            </a>
        `).join('');
    }).catch(() => { document.getElementById('shorts-list').innerHTML = '데이터를 불러올 수 없습니다.'; });
</script>
</body>
</html>
