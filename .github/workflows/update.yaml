name: Update Dashboard Data

on:
  schedule:
    - cron: '*/5 * * * *'  # 30분마다 실행 (한국 시간 기준)
  workflow_dispatch: # 수동 실행 버튼 추가

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          # 기존에 필요한 패키지가 있다면 여기에 추가 (예: sqlite3는 내장, pandas 등)
          
      - name: Run main.py
        run: python main.py
        
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .  # notices.json과 index.html, db 파일 등을 모두 포함
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto update data and notices" && git push)
