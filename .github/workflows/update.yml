name: Update SOOP Notice Data

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 코드 불러오기
        uses: actions/checkout@v3

      - name: 파이썬 환경 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 필수 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: 파이썬 크롤링 스크립트 실행
        run: python yxl.py

      - name: 변경된 데이터 커밋 및 푸시
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 파일이 생겼는지 확인하고 커밋
          if [ -f notice_data.json ]; then
            git add notice_data.json
            git commit -m "Auto-update: SOOP notice data"
            git push
          else
            echo "notice_data.json이 생성되지 않았습니다."
          fi
