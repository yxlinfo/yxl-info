<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YXL Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-gray-800">

    <!-- Header -->
    <header class="border-b py-6 sticky top-0 bg-white z-50">
        <nav class="max-w-6xl mx-auto flex justify-between items-center px-4">
            <div class="font-bold text-xl">와이엑스엘 (YXL)</div>
            <ul class="flex gap-8 font-medium">
                <li><a href="#" class="hover:text-blue-600">홈</a></li>
                <li><a href="#" class="hover:text-blue-600">현황판</a></li>
                <li class="relative group">
                    <a href="#" class="hover:text-blue-600">데이터 ▼</a>
                    <ul class="absolute hidden group-hover:block bg-white border shadow-md mt-2 w-32 py-2">
                        <li><a href="#" class="block px-4 py-1 hover:bg-gray-100">VIP랭킹</a></li>
                        <li><a href="#" class="block px-4 py-1 hover:bg-gray-100">매출표</a></li>
                        <li><a href="#" class="block px-4 py-1 hover:bg-gray-100">정산표</a></li>
                    </ul>
                </li>
                <li><a href="#" class="hover:text-blue-600">보라방송</a></li>
            </ul>
        </nav>
    </header>

    <main class="max-w-6xl mx-auto p-4 space-y-12 my-12">
        
        <!-- 공지사항 카드 리스트 -->
        <section>
            <h2 class="text-lg font-bold mb-4">공지사항</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="border p-4 rounded-lg hover:shadow-md transition">
                    <p class="text-xs text-gray-500 mb-1">2026.05.25 | 서니</p>
                    <h3 class="font-bold mb-2">14시즌 정산표 관련 수정사항 공유</h3>
                    <p class="text-sm text-gray-600 mb-3 truncate">이번 14시즌 정산 로직이 변경되었습니다. 기존 방식에서 누락되었던...</p>
                    <a href="#" class="text-blue-600 text-sm font-semibold">원문 바로가기 →</a>
                </div>
                <!-- 카드 반복 가능 -->
            </div>
        </section>

        <!-- 라이브 상태 배지 -->
        <section class="border-t pt-8">
            <h2 class="text-lg font-bold mb-4">LIVE 상태 (3 / 20명)</h2>
            <div class="flex gap-3 flex-wrap">
                <span class="px-4 py-2 bg-red-100 text-red-700 rounded-full text-sm font-bold animate-pulse">서니 (LIVE)</span>
                <span class="px-4 py-2 bg-red-100 text-red-700 rounded-full text-sm font-bold animate-pulse">류레카시아 (LIVE)</span>
                <span class="px-4 py-2 bg-gray-100 text-gray-500 rounded-full text-sm">윤우</span>
                <span class="px-4 py-2 bg-gray-100 text-gray-500 rounded-full text-sm">채영</span>
            </div>
        </section>

        <!-- 시그니처 댄스 섹션 (좌우분할) -->
        <section class="border-t pt-8 grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="aspect-[9/16] bg-black rounded-xl overflow-hidden shadow-xl">
                <iframe class="w-full h-full" src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
            </div>
            <div class="space-y-6">
                <div>
                    <h3 class="text-sm font-bold text-gray-500 mb-3">멤버 선택</h3>
                    <div class="flex flex-wrap gap-2">
                        <button class="px-4 py-2 bg-blue-600 text-white rounded-md text-sm">서니</button>
                        <button class="px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-md text-sm">류레카시아</button>
                    </div>
                </div>
                <div>
                    <h3 class="text-sm font-bold text-gray-500 mb-3">시그니처 댄스</h3>
                    <div class="flex flex-wrap gap-2">
                        <button class="px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-md text-sm">댄스 A</button>
                        <button class="px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-md text-sm">댄스 B</button>
                    </div>
                </div>
            </div>
        </section>

    </main>

</body>
</html>
