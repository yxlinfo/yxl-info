<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>YXL Dashboard</title>
    <style>
        :root {
            --bg: #0F0D09; --panel: #181410; --card: #1E1A14;
            --gold: #C5A059; --gold-dim: #8c7340; --text: #F5F0E8;
            --text-sub: #8A7F70; --border: rgba(197,160,89,0.22); --red: #d9213a;
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:Pretendard,'Apple SD Gothic Neo',sans-serif; padding: 20px; }
        .container { max-width: 950px; margin: 0 auto; }
        a { text-decoration: none; color: inherit; transition: border 0.2s; }
        a:hover { border-color: var(--gold) !important; }

        h2 { font-size: 15px; color: var(--gold); margin-bottom: 15px; display: flex; align-items: center; gap: 8px; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }
        h2 svg { width: 18px; height: 18px; fill: var(--gold); }
        .section { margin-bottom: 35px; }

        .h-scroll { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 12px; scrollbar-width: thin; scrollbar-color: var(--gold-dim) var(--panel); flex-wrap: nowrap; }
        
        .notice-card { flex: 0 0 260px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
        .notice-thumb { width: 100%; height: 146px; object-fit: cover; background: #000; }
        .notice-info { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .notice-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .notice-meta { display: flex; align-items: center; justify-content: space-between; font-size: 11px; color: var(--text-sub); }
        .user-prof { display: flex; align-items: center; gap: 6px; }
        .user-prof img { width: 20px; height: 20px; border-radius: 50%; border: 1px solid var(--gold-dim); object-fit: cover; }

        .live-card { flex: 0 0 280px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; position: relative; }
        .live-thumb { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        .live-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .badge-live { position: absolute; top: 8px; left: 8px; background: var(--red); color: white; font-size: 10px; padding: 2px 6px; border-radius: 3px; font-weight: 800; }
        .badge-viewers { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.7); color: white; font-size: 11px; padding: 2px 6px; border-radius: 3px; }
        .live-info { padding: 12px; display: flex; gap: 10px; align-items: center; }
        .live-prof { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
        .live-text { flex: 1; overflow: hidden; }
        .live-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
        .live-name { font-size: 12px; font-weight: 700; color: var(--gold); }
        .live-time { font-size: 10px; color: var(--text-sub); display: block; margin-top: 2px; }

        .bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .box { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 15px; min-height: 250px; }
        
        .sched-card { background: var(--card); border-left: 3px solid var(--gold); padding: 12px; margin-bottom: 10px; border-radius: 4px; display: flex; align-items: center; gap: 15px; }
        .sched-dday { font-size: 16px; font-weight: 800; color: var(--gold); min-width: 50px; text-align: center; }
        .sched-title { font-size: 13px; font-weight: 600; display: block; margin-bottom: 3px; }
        .sched-date { font-size: 11px; color: var(--text-sub); }

        @media (max-width: 768px) { .bottom-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <section class="section">
        <h2>
            <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
            공지사항
        </h2>
        <div id="notice-list" class="h-scroll">로딩 중...</div>
    </section>

    <section class="section">
        <h2>
            <svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
            LIVE
        </h2>
        <div id="live-list" class="h-scroll">로딩 중...</div>
    </section>

    <div class="bottom-grid">
        <section class="section">
            <h2>
                <svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>
                일정표
            </h2>
            <div id="schedule-list" class="box">로딩 중...</div>
        </section>

        <section class="section">
            <h2>
                <svg viewBox="0 0 24 24"><path d="M10 16.5l6-4.5-6-4.5v9zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
                숏츠
            </h2>
            <div class="box" style="display:flex; align-items:center; justify-content:center; color:var(--text-sub);">
                업데이트 예정
            </div>
        </section>
    </div>
</div>

<script>
    fetch('notices.json').then(r => r.json()).then(data => {
        const el = document.getElementById('notice-list');
        if(!data || data.length === 0) { el.innerHTML = '<div style="color:var(--text-sub)">등록된 공지사항이 없습니다.</div>'; return; }
        el.innerHTML = data.slice(0, 10).map(n => `
            <a href="${n.link}" target="_blank" class="notice-card">
                <img src="${n.thumbnail}" class="notice-thumb" onerror="this.src='https://via.placeholder.com/260x146/1E1A14/C5A059?text=No+Image'">
                <div class="notice-info">
                    <span class="notice-title">${n.title || '제목 없음'}</span>
                    <div class="notice-meta">
                        <div class="user-prof">
                            <img src="${n.profile_image}" onerror="this.src='https://via.placeholder.com/20/1E1A14/C5A059'">
                            <span>${n.user_nick || '알 수 없음'}</span>
                        </div>
                        <span>조회 ${n.read_cnt || 0} | 👍 ${n.like_cnt || 0}</span>
                    </div>
                </div>
            </a>
        `).join('');
    }).catch(() => { document.getElementById('notice-list').innerHTML = '데이터를 불러올 수 없습니다.'; });

    fetch('live.json').then(r => r.json()).then(data => {
        const el = document.getElementById('live-list');
        if(!data || data.length === 0) { el.innerHTML = '<div style="color:var(--text-sub); padding:10px;">현재 방송 중인 멤버가 없습니다.</div>'; return; }
        el.innerHTML = data.map(l => {
            let timeStr = "";
            if(l.start_time) {
                const parts = l.start_time.split(" ");
                if(parts.length > 1) timeStr = parts[1].substring(0, 5) + " 시작";
            }
            return `
            <a href="${l.live_link}" target="_blank" class="live-card">
                <div class="live-thumb">
                    <img src="${l.thumbnail}" onerror="this.src='https://via.placeholder.com/280x157/1E1A14/C5A059?text=No+Signal'">
                    <span class="badge-live">LIVE</span>
                    <span class="badge-viewers">👥 ${(l.viewers || 0).toLocaleString()}명</span>
                </div>
                <div class="live-info">
                    <img src="${l.profile_image}" class="live-prof" onerror="this.src='https://via.placeholder.com/36/1E1A14/C5A059'">
                    <div class="live-text">
                        <div class="live-title">${l.title || '방송 중'}</div>
                        <div>
                            <span class="live-name">${l.name} (${l.pos})</span>
                        </div>
                        <span class="live-time">⏱ ${timeStr || '방금 전'}</span>
                    </div>
                </div>
            </a>
            `;
        }).join('');
    }).catch(() => { document.getElementById('live-list').innerHTML = '데이터를 불러올 수 없습니다.'; });

    fetch('schedule.json').then(r => r.json()).then(data => {
        const el = document.getElementById('schedule-list');
        if(!data || data.length === 0) { el.innerHTML = '<div style="color:var(--text-sub)">등록된 일정이 없습니다.</div>'; return; }
        
        const formatter = new Intl.DateTimeFormat('en-US', { timeZone: 'Asia/Seoul', year: 'numeric', month: '2-digit', day: '2-digit' });
        const parts = formatter.formatToParts(new Date());
        const kstDateStr = `${parts.find(p=>p.type==='year').value}-${parts.find(p=>p.type==='month').value}-${parts.find(p=>p.type==='day').value}T00:00:00+09:00`;
        const todayKST = new Date(kstDateStr);

        el.innerHTML = data.map(s => {
            const target = new Date(s.date + "+09:00");
            target.setHours(0,0,0,0);
            
            const diff = Math.ceil((target - todayKST) / (1000 * 60 * 60 * 24));
            let dday = diff === 0 ? "D-Day" : (diff > 0 ? `D-${diff}` : "종료");
            const targetDateStr = `${target.getMonth()+1}월 ${target.getDate()}일`;
            
            return `
            <div class="sched-card">
                <div class="sched-dday">${dday}</div>
                <div>
                    <span class="sched-title">${s.title}</span>
                    <span class="sched-date">${targetDateStr} ${s.desc ? `| ${s.desc}` : ''}</span>
                </div>
            </div>`;
        }).join('');
    }).catch(() => { document.getElementById('schedule-list').innerHTML = '데이터를 불러올 수 없습니다.'; });
</script>
</body>
</html>
