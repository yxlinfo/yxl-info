<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YXL LIVE STATUS</title>
    <style>
        /* 와이고수 모바일 환경 최적화 디자인 */
        body { background: #121212; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
        
        .card { 
            background: #1e1e1e; border-radius: 10px; padding: 12px; 
            border: 1px solid #2c2c2c; text-align: center; transition: 0.3s;
        }
        /* 방송 중일 때 보라색 테두리와 빛나는 효과 */
        .card.on { border-color: #a855f7; box-shadow: 0 0 10px rgba(168, 85, 247, 0.4); }
        
        .name { font-size: 14px; font-weight: bold; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .status-box { display: flex; align-items: center; justify-content: center; gap: 5px; font-size: 12px; }
        
        /* 라이브 표시 점 */
        .dot { width: 7px; height: 7px; border-radius: 50%; background: #444; }
        .on .dot { background: #ef4444; box-shadow: 0 0 5px #ef4444; animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        
        .count { color: #aaa; }
        .lock { color: #fbbf24; font-size: 11px; } /* 비번방 자물쇠 */
        
        a { text-decoration: none; color: inherit; display: block; }
    </style>
</head>
<body>
    <div class="grid" id="status-grid"></div>

    <script>
        async function loadStatus() {
            try {
                // yxl.py가 생성하는 status.json을 읽어옵니다.
                const response = await fetch('status.json?v=' + Date.now());
                const data = await response.json();
                const grid = document.getElementById('status-grid');
                grid.innerHTML = '';

                Object.entries(data).forEach(([mid, info]) => {
                    const card = document.createElement('div');
                    card.className = `card ${info.is_on ? 'on' : ''}`;
                    
                    // 비번방(is_password)일 때 자물쇠 아이콘 추가
                    const lock = info.is_password ? '<span class="lock">🔒</span>' : '';
                    const displayViewers = info.is_on ? info.viewers.toLocaleString() + '명' : 'OFFLINE';
                    
                    card.innerHTML = `
                        <a href="https://play.sooplive.co.kr/${mid}" target="_blank">
                            <div class="name">${info.name}</div>
                            <div class="status-box">
                                <div class="dot"></div>
                                <div class="count">${displayViewers} ${lock}</div>
                            </div>
                        </a>
                    `;
                    grid.appendChild(card);
                });
            } catch (e) { console.error("데이터 로드 오류", e); }
        }
        loadStatus();
        setInterval(loadStatus, 60000); // 1분마다 자동 갱신
    </script>
</body>
</html>
