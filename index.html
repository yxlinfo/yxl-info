<script>
    document.addEventListener('DOMContentLoaded', loadNotices);

    async function loadNotices() {
        try {
            const response = await fetch('notices.json');
            const notices = await response.json();
            const container = document.getElementById('notice-container');
            container.innerHTML = ''; 

            notices.forEach(n => {
                // 48시간 이내 NEW 뱃지 계산
                const isNew = (new Date() - new Date(n.date.replace(/-/g, '/'))) < (48 * 60 * 60 * 1000);
                
                const cardHTML = `
                    <div class="notice-card" onclick="goToPost('${n.id}', '${n.user_id}')">
                        ${isNew ? '<span class="badge-new">NEW</span>' : ''}
                        ${n.thumbnail ? `<img src="${n.thumbnail}" class="thumb-img">` : ''}
                        <div class="card-meta-top">
                            <div class="author-info">
                                ${n.profile_image ? `<img src="${n.profile_image}" class="profile-img">` : ''}
                                <span class="card-author">${n.user_nick}</span>
                            </div>
                            <span class="card-date">${n.date.substring(5, 10)}</span>
                        </div>
                        <h4>${n.title}</h4>
                        <p>${n.summary}</p>
                        <div class="card-meta-bottom">
                            <span>조회:${n.read_cnt}</span> <span>VOD:${n.vod_read_cnt}</span>
                            <span>댓글:${n.comment_cnt}</span> <span>추천:${n.like_cnt}</span>
                        </div>
                    </div>`;
                container.insertAdjacentHTML('beforeend', cardHTML);
            });
        } catch (e) {
            console.error("데이터 로드 에러:", e);
        }
    }

    function goToPost(bbs_no, user_id) {
        window.open(`https://www.sooplive.com/station/${user_id}/board/${bbs_no}`, '_blank');
    }
</script>
