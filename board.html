<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YXL 실시간 현황판</title>
    <style>
        /* 와이고수 다크모드/라이트모드 어디서나 잘 어울리는 스타일 */
        body { background: #121212; color: #e0e0e0; font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 10px; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
            gap: 8px; 
        }

        /* 카드 기본 디자인 */
        .card { 
            background: #1e1e1e; border-radius: 8px; padding: 10px; 
            border: 1px solid #2c2c2c; position: relative;
            transition: all 0.3s ease;
        }
        
        /* 방송 중일 때 하이라이트 (유저님의 최신 선호 반영: 보라색 글로우) */
        .card.on { 
            border-color: #8a2be2; 
            box-shadow: 0 0 8px rgba(138, 43, 226, 0.4); 
        }

        /* 닉네임 및 상태 */
        .name { font-size: 13px; font-weight: bold; margin-bottom: 4px; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .info { font-size: 11px; color: #999; display: flex; align-items: center; justify-content: center; gap: 4px; }
        
        /* 라이브 점(Dot) 애니메이션 */
        .dot { width: 6px; height: 6px; border-radius: 50%; background: #444; }
        .on .dot { background: #ff4d4d; box-shadow: 0 0 5px #ff4d4d; animation: blink 1.5s infinite; }
        
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* 자물쇠(비번방) 아이콘 */
        .lock { color: #ffd700; font-size: 10px; }
        
        a { text-decoration: none; color: inherit; }
    </style>
</head>
<body>
    <div class="grid" id="status-container">
        <!-- 데이터 로딩 전 표시 -->
    </div>

    <script>
        async function fetchStatus() {
            try {
                // status.json은 yxl.py가 생성한 최신 데이터를 읽어옵니다.
                const res = await fetch('status.json?v=' + Date.now());
                const data = await res.json();
                const container = document.getElementById('status-container');
                container.innerHTML = '';

                Object.entries(data).forEach(([mid, info]) => {
                    const card = document.createElement('div');
                    card.className = `card ${info.is_on ? 'on' : ''}`;
                    
                    const lockIcon = info.is_password ? '<span class="lock">🔒</span>' : '';
                    const viewerCount = info.is_on ? info.viewers.toLocaleString() + '명' : 'OFF';
                    
                    card.innerHTML = `
                        <a href="https://play.sooplive.co.kr/${mid}" target="_blank">
                            <div class="name">${info.name}</div>
                            <div class="info">
                                <div class="dot"></div>
                                <span>${viewerCount}</span>
                                ${lockIcon}
                            </div>
                        </a>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                console.error("현황판 업데이트 실패:", err);
            }
        }

        // 초기 실행 및 1분마다 자동 갱신
        fetchStatus();
        setInterval(fetchStatus, 60000);
    </script>
</body>
</html>
